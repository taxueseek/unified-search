cache:
  db_path: ~/.cache/unified-search/cache.db
  enabled: true
  max_size_mb: 200
  ttl: 3600

domains:
- desc: 微信公众号文章搜索
  engines_combo:
  - wechat_sogou
  fallback: wechat_sogou
  name: wechat_search
  parallel: false
  patterns:
  - (?i)(公众号|微信文章|微信公众号|wechat.*article|mp\.weixin)
  - (?i)(搜狗微信|微信搜索|搜公众号)
  primary: wechat_sogou
- desc: Hacker News 搜索
  engines_combo:
  - hackernews
  fallback: hackernews
  name: hackernews_search
  parallel: false
  patterns:
  - (?i)(hacker.?news|hn|news\.ycombinator)
  - (?i)(hackernews|hn\s+search)
  primary: hackernews
- desc: Stack Overflow 搜索
  engines_combo:
  - stackoverflow
  fallback: stackoverflow
  name: stackoverflow_search
  parallel: false
  patterns:
  - (?i)(stack.?overflow|stackoverflow|编程问题|代码问题|技术问答)
  - (?i)(python.*error|javascript.*error|java.*error|debug.*code|fix.*bug)
  primary: stackoverflow
- desc: 学术搜索（Google Scholar）
  engines_combo:
  - google_scholar
  - arxiv
  fallback: google_scholar
  name: scholar_search
  parallel: false
  patterns:
  - (?i)(google.?scholar|学术论文|论文搜索|research.*paper|journal.*article)
  - (?i)(sci-hub|学术文献|学位论文|会议论文)
  primary: google_scholar
- desc: V2EX 社区搜索
  engines_combo:
  - v2ex
  fallback: v2ex
  name: v2ex_search
  parallel: false
  patterns:
  - (?i)(v2ex|v2ex\.com)
  - (?i)(技术社区|程序员社区|开发者论坛)
  primary: v2ex
- desc: 同花顺热点/强势股
  engines_combo:
  - ths_hot
  fallback: ths_hot
  name: ths_hot_search
  parallel: false
  patterns:
  - (?i)(同花顺热点|强势股|涨停原因|题材归因|热点板块|今日强势)
  - (?i)(hot stocks|trending stocks|market theme|momentum)
  primary: ths_hot
- desc: 财联社电报
  engines_combo:
  - cls_telegraph
  fallback: cls_telegraph
  name: cls_telegraph_search
  parallel: false
  patterns:
  - (?i)(财联社|cls\.cn|电报|快讯|财经快讯)
  primary: cls_telegraph
- desc: 东财全球资讯
  engines_combo:
  - em_global_news
  fallback: em_global_news
  name: em_news_search
  parallel: false
  patterns:
  - (?i)(东财资讯|全球资讯|7x24|财经快讯|市场快讯)
  - (?i)(eastmoney news|global news|financial news)
  primary: em_global_news
- desc: 基金筛选/基金数据
  engines_combo:
  - eastmoney
  - anysearch
  fallback: anysearch
  name: fund_query
  parallel: false
  patterns:
  - (?i)(基金|公募|私募|ETF|LOF|FOF|基金经理|基金净值|基金排行|选基)
  primary: eastmoney
  quote: true
- desc: 股票/行情查询
  engines_combo:
  - eastmoney
  - anysearch
  fallback: anysearch
  name: stock_query
  parallel: false
  patterns:
  - (?i)(股价|行情|涨跌|K线|大盘|指数|涨停|跌停|板块|概念股)
  - (?i)(stock|quote|price|market\s+cap)
  - A股|港股|美股|股票|ETF|板块
  primary: eastmoney
  quote: true
- desc: 财经资讯/研报/公告
  engines_combo:
  - byted
  - eastmoney
  - anysearch
  fallback: eastmoney
  name: financial_news
  parallel: true
  patterns:
  - (?i)(研报|财报|公告|财经|宏观|央行政策|降息|加息|CPI|GDP|PMI)
  - (?i)(financial|earnings|report|announcement)
  primary: byted
- desc: 知乎/观点/经验/评测
  engines_combo:
  - zhihu
  - anysearch
  fallback: anysearch
  name: zhihu_content
  parallel: true
  patterns:
  - (?i)(知乎|怎么看待|如何评价|体验|评测|对比|推荐|哪个好|值得买|好不好|要不要|推荐吗|求推荐|有什么)
  primary: zhihu
- desc: 学术论文搜索
  engines_combo:
  - arxiv
  - openalex
  - crossref
  - semantic_scholar
  fallback: semantic_scholar
  name: academic
  parallel: true
  patterns:
  - (?i)(论文|paper|arXiv|preprint|DOI|引用|citation|学术)
  - \b\d{4}\.\d{4,5}\b
  - (?i)(transformer|attention\s+mechanism|neural\s+network|deep\s+learning|machine\s+learning|BERT|GPT)
  primary: arxiv
- desc: 购物评测/选购推荐
  engines_combo:
  - zhihu
  - anysearch
  fallback: anysearch
  name: shopping
  parallel: true
  patterns:
  - (?i)(评测|推荐|哪个好|值得买|选购|入手|踩坑|避雷|best|review|comparison)
  primary: zhihu
- desc: 语义发现/开放式调研（Exa 语义引擎）
  engines_combo:
  - exa
  - anysearch
  fallback: anysearch
  name: semantic_discovery
  parallel: false
  patterns:
  - (?i)(find me|discover|explore|landscape|ecosystem|what are the best|top.*tools|emerging|trending.*202[56])
  - (?i)(有哪些值得关注|最新进展|行业格局|赛道分析|盘点一下|梳理一下)
  primary: exa
  cost_tier: api
- desc: 技术深度研究
  engines_combo:
  - semantic_scholar
  - arxiv
  - openalex
  - github
  - exa
  fallback: arxiv
  name: tech_deep
  parallel: true
  patterns:
  - (?i)(research|deep dive|综述|survey|state of the art|SOTA)
  - (?i)(原理|底层|实现|源码分析|架构设计|论文)
  primary: semantic_scholar
- desc: 代码搜索/开源项目
  engines_combo:
  - github
  - anysearch
  fallback: anysearch
  name: code_search
  parallel: true
  patterns:
  - (?i)(github|source code|代码|源码|开源|函数|API|实现|用法|example|snippet)
  - (?i)\b(repo|repository|library|package|npm|pip|cargo)\b
  primary: github
- desc: 事实查询/快速问答
  engines_combo:
  - duckduckgo
  - wikipedia
  - wolframalpha
  fallback: duckduckgo
  name: fact_check
  parallel: true
  patterns:
  - (?i)(what is|who is|when did|where is|how many|how much)
  - (?i)(是什么|是谁|什么时候|在哪里|多少|多少钱)
  primary: duckduckgo
- desc: 实时新闻/事件
  engines_combo:
  - byted
  - duckduckgo
  fallback: duckduckgo
  name: news_realtime
  parallel: true
  patterns:
  - (?i)(最新新闻|最新进展|今天发生|突发|breaking)
  - (?i)\b(news|latest)\b
  primary: byted
- desc: 中文通用搜索
  engines_combo:
  - bocha
  - byted
  - wechat_sogou
  fallback: bocha
  name: chinese_general
  parallel: true
  patterns:
  - '[一-鿿]'
  primary: bocha
- desc: 本地中文搜索
  engines_combo:
  - local_search
  - bocha
  fallback: local_search
  name: local_chinese
  parallel: true
  patterns:
  - (?i)(百度|搜狗|site:baidu.com|site:sogou.com)
  primary: local_search
- desc: 本地新闻搜索
  engines_combo:
  - local_search
  - byted
  fallback: byted
  name: local_news
  parallel: true
  patterns:
  - (?i)(本地新闻|bing news|google news|news rss)
  primary: local_search
- desc: 本地代码搜索
  engines_combo:
  - local_search
  - github
  - anysearch
  fallback: anysearch
  name: local_code
  parallel: true
  patterns:
  - (?i)(stackoverflow|npm package|gitlab repo|github repo|site:stackoverflow.com)
  primary: local_search
- desc: 本地学术搜索
  engines_combo:
  - local_search
  - arxiv
  - semantic_scholar
  fallback: arxiv
  name: local_academic
  parallel: true
  patterns:
  - (?i)(arxiv api|semantic scholar|crossref|pubmed|site:arxiv.org)
  primary: local_search
- desc: 本地参考百科
  engines_combo:
  - local_search
  - wikipedia
  - duckduckgo
  fallback: duckduckgo
  name: local_reference
  parallel: true
  patterns:
  - (?i)(wikipedia api|wiktionary|wikiquote|nominatim|openstreetmap)
  primary: local_search
- desc: 本地通用搜索（兜底）
  engines_combo:
  - local_search
  - anysearch
  fallback: anysearch
  name: local_general
  parallel: true
  patterns:
  - (?i)(本地搜索|local search|零成本|free search)
  primary: local_search
- desc: 社交平台/UGC/舆论
  engines_combo:
  - twitter
  - reddit
  - xiaohongshu
  - bilibili
  - weibo
  fallback: reddit
  name: social
  parallel: true
  patterns:
  - (?i)(小红书|抖音|推特|twitter|reddit|b站|bilibili|微博|v2ex|评论|帖子|热门|trending|viral|opinion|sentiment|舆论|舆情|种草|拔草|用户体验|口碑)
  - (?i)(xhs|douyin|tweet|retweet|up主|博主|粉丝|点赞|转发|收藏)
  primary: twitter
  quote: false

engines:
  local_search:
    type: cli
    enabled: true
    cmd:
    - python3
    - sub-skills/local-search/search_v3.py
    search_args:
    - '{query}'
    - --n
    - '{n}'
    - --mode
    - '{mode}'
    - --json
    env: {}
  anysearch:
    cmd:
    - python3
    - ~/.claude/skills/argo/scripts/anysearch_http.py
    enabled: true
    env: {}
    search_args:
    - search
    - '{query}'
    - '-n'
    - '{n}'
    type: cli
  arxiv:
    enabled: true
    format: xml
    method: GET
    query_param: search_query
    timeout: 15
    type: http
    url: http://export.arxiv.org/api/query
  bocha:
    body:
      count: '{n}'
      freshness: oneYear
      query: '{query}'
      summary: true
    enabled: true
    headers:
      Authorization: Bearer {BOCHA_API_KEY}
      Content-Type: application/json
    method: POST
    timeout: 8
    type: http
    url: https://api.bochaai.com/v1/web-search
  brave:
    enabled: false
    extra_params:
      count: '{n}'
    format: json
    headers:
      Accept: application/json
      Accept-Encoding: gzip
      X-Subscription-Token: '{BRAVE_API_KEY}'
    method: GET
    query_param: q
    timeout: 8
    type: http
    url: https://api.search.brave.com/res/v1/web/search
  byted:
    body:
      Count: '{n}'
      NeedSummary: true
      Query: '{query}'
      SearchType: web
    enabled: true
    headers:
      Authorization: Bearer {WEB_SEARCH_API_KEY}
      Content-Type: application/json
      X-Traffic-Tag: skill_web_search
    method: POST
    output_map:
      item_source: SiteName
      item_summary: Summary
      item_title: Title
      item_url: Url
      items: Result.WebResults
    timeout: 8
    type: http
    url: https://open.feedcoopapi.com/search_api/web_search
  crossref:
    enabled: false
    extra_params:
      mailto: unified-search@local
      rows: '{n}'
    format: json
    method: GET
    query_param: query
    timeout: 12
    type: http
    url: https://api.crossref.org/works
  duckduckgo:
    enabled: true
    format: json
    method: GET
    query_param: q
    timeout: 5
    type: http
    url: https://api.duckduckgo.com/
  exa:
    cost_tier: api
    enabled: true
    timeout: 15
    type: exa
  eastmoney:
    enabled: true
    timeout: 12
    type: eastmoney
  v2ex:
    enabled: true
    timeout: 10
    type: v2ex
  google_scholar:
    enabled: true
    timeout: 12
    type: google_scholar
  hackernews:
    enabled: true
    timeout: 8
    type: hackernews
  stackoverflow:
    enabled: true
    timeout: 8
    type: stackoverflow
  ths_hot:
    enabled: true
    timeout: 10
    type: ths_hot
  cls_telegraph:
    enabled: true
    timeout: 10
    type: cls_telegraph
  em_global_news:
    enabled: true
    timeout: 10
    type: em_global_news
  felo:
    body:
      query: '{query}'
    enabled: false
    headers:
      Accept: application/json
      Authorization: Bearer {FELO_API_KEY}
      Content-Type: application/json
      User-Agent: unified-search/1.0.1
    method: POST
    timeout: 15
    type: http
    url: https://openapi.felo.ai/v2/chat
  github:
    enabled: true
    extra_params:
      per_page: '{n}'
    format: json
    headers:
      Accept: application/vnd.github.v3+json
      Authorization: token {GITHUB_TOKEN}
      User-Agent: unified-search
    method: GET
    query_param: q
    timeout: 10
    type: http
    url: https://api.github.com/search/repositories
  metaso:
    body:
      query: '{query}'
      search_size: '{n}'
      source: web
    enabled: false
    headers:
      Authorization: Bearer {METASO_API_KEY}
      Content-Type: application/json
    method: POST
    timeout: 10
    type: http
    url: https://metaso.cn/api/open/search
  openalex:
    enabled: false
    extra_params:
      mailto: unified-search@local
      per_page: '{n}'
    format: json
    method: GET
    query_param: search
    timeout: 12
    type: http
    url: https://api.openalex.org/works
  searxng:
    enabled: false
    format: json
    method: GET
    query_param: q
    timeout: 10
    type: http
    url: http://127.0.0.1:8888/search
  semantic_scholar:
    enabled: true
    format: json
    method: GET
    query_param: query
    timeout: 10
    type: http
    url: https://api.semanticscholar.org/graph/v1/paper/search
  tavily:
    body:
      api_key: '{TAVILY_API_KEY}'
      max_results: '{n}'
      query: '{query}'
      search_depth: basic
      topic: general
      include_answer: basic
    enabled: true
    headers:
      Content-Type: application/json
    method: POST
    timeout: 10
    type: http
    url: https://api.tavily.com/search
  uapi:
    body:
      count: '{n}'
      query: '{query}'
    enabled: false
    headers:
      Content-Type: application/json
    method: POST
    timeout: 8
    type: http
    url: https://uapis.cn/api/v1/search/aggregate
  wikipedia:
    enabled: true
    extra_params:
      action: query
      format: json
      list: search
      srlimit: '{n}'
    format: json
    headers:
      User-Agent: argo-search/1.0
    method: GET
    query_param: srsearch
    timeout: 8
    type: http
    url: https://en.wikipedia.org/w/api.php
  wolframalpha:
    enabled: false
    extra_params:
      appid: '{WOLFRAM_APPID}'
      output: json
    format: json
    method: GET
    query_param: input
    timeout: 10
    type: http
    url: https://api.wolframalpha.com/v2/query
  zhihu:
    enabled: true
    format: json
    headers:
      Authorization: Bearer {ZHIHU_ACCESS_SECRET}
      Content-Type: application/json
      X-Request-Timestamp: '{TIMESTAMP}'
    method: GET
    query_param: Query
    extra_params:
      Count: '{n}'
    output_map:
      items: Data.Items
      item_title: Title
      item_url: Url
      item_summary: ContentText
      item_source: AuthorName
    timeout: 10
    type: http
    url: https://developer.zhihu.com/api/v1/content/zhihu_search

  # ── 社交平台引擎 ────────────────────────────────────────────────────────────
  twitter:
    type: cli
    enabled: true
    cmd:
    - python3
    - ~/.claude/skills/argo/scripts/social_engines/twitter_engine.py
    search_args:
    - search
    - '{query}'
    - '-n'
    - '{n}'
    env: {}
  reddit:
    type: cli
    enabled: true
    cmd:
    - python3
    - ~/.claude/skills/argo/scripts/social_engines/reddit_engine.py
    search_args:
    - search
    - '{query}'
    - '-n'
    - '{n}'
    env: {}

  # ── Local Search 子引擎（v2.1 上游化）──────────────────────────────────────
  local_bing:
    type: html
    enabled: true
    url: "https://www.bing.com/search"
    query_param: q
    extra_params:
      setlang: zh-Hans
    timeout: 8

  local_google:
    type: html
    enabled: false
    url: "https://www.google.com/search"
    query_param: q
    extra_params:
      hl: zh-CN
    timeout: 8

  local_mojeek:
    type: html
    enabled: true
    url: "https://www.mojeek.com/search"
    query_param: q
    timeout: 10

  local_yandex:
    type: html
    enabled: false
    url: "https://yandex.com/search/"
    query_param: text
    timeout: 10

  local_startpage:
    type: html
    enabled: true
    url: "https://www.startpage.com/do/dsearch"
    query_param: query
    timeout: 10

  local_duckduckgo:
    type: html
    enabled: true
    url: "https://html.duckduckgo.com/html/"
    query_param: q
    timeout: 8

  local_baidu:
    type: html
    enabled: true
    url: "https://www.baidu.com/s"
    query_param: wd
    extra_params:
      ie: utf-8
    timeout: 8

  local_sogou:
    type: html
    enabled: true
    url: "https://www.sogou.com/web"
    query_param: query
    timeout: 8

  local_arxiv:
    type: http
    enabled: true
    format: xml
    method: GET
    query_param: search_query
    extra_params:
      start: 0
      max_results: "{n}"
    timeout: 15
    url: "http://export.arxiv.org/api/query"

  local_pubmed:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: term
    extra_params:
      db: pubmed
      retmode: json
      retmax: "{n}"
    output_map:
      items: "esearchresult.idlist"
      item_title: "pmid"
      item_url: "pmid"
      item_summary: "pmid"
    timeout: 12
    url: "https://eutils.ncbi.nlm.nih.gov/entrez/eutils/esearch.fcgi"

  local_crossref:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: query
    extra_params:
      rows: "{n}"
      mailto: unified-search@local
    output_map:
      items: "message.items"
      item_title: "title"
      item_url: "URL"
      item_summary: "abstract"
    timeout: 12
    url: "https://api.crossref.org/works"

  local_semantic_scholar:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: query
    extra_params:
      limit: "{n}"
      fields: title,abstract,url
    output_map:
      items: "data"
      item_title: "title"
      item_url: "url"
      item_summary: "abstract"
    timeout: 12
    url: "https://api.semanticscholar.org/graph/v1/paper/search"

  local_bing_news:
    type: http
    enabled: true
    format: xml
    method: GET
    query_param: q
    extra_params:
      format: rss
    timeout: 8
    url: "https://www.bing.com/news/search"

  local_google_news:
    type: http
    enabled: true
    format: xml
    method: GET
    query_param: q
    timeout: 8
    url: "https://news.google.com/rss/search"

  local_github:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: q
    extra_params:
      per_page: "{n}"
    headers:
      Accept: application/vnd.github.v3+json
      User-Agent: argo-search/2.1
    output_map:
      items: "items"
      item_title: "full_name"
      item_url: "html_url"
      item_summary: "description"
    timeout: 10
    url: "https://api.github.com/search/repositories"

  local_stackoverflow:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: q
    extra_params:
      site: stackoverflow
      pagesize: "{n}"
      order: desc
      sort: relevance
    output_map:
      items: "items"
      item_title: "title"
      item_url: "link"
      item_summary: "excerpt"
    timeout: 10
    url: "https://api.stackexchange.com/2.3/search/advanced"

  local_gitlab:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: search
    extra_params:
      per_page: "{n}"
      scope: projects
    output_map:
      items: "."
      item_title: "name_with_namespace"
      item_url: "web_url"
      item_summary: "description"
    timeout: 10
    url: "https://gitlab.com/api/v4/search"

  local_npm:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: text
    extra_params:
      size: "{n}"
    output_map:
      items: "objects"
      item_title: "package.name"
      item_url: "package.links.npm"
      item_summary: "package.description"
    timeout: 8
    url: "https://registry.npmjs.org/-/v1/search"

  local_wikipedia:
    type: http
    enabled: true
    format: json
    method: GET
    query_param: srsearch
    extra_params:
      action: query
      list: search
      format: json
      srlimit: "{n}"
    output_map:
      items: "query.search"
      item_title: "title"
      item_url: "title"
      item_summary: "snippet"
      url_template: "https://en.wikipedia.org/wiki/{title}"
    timeout: 8
    url: "https://en.wikipedia.org/w/api.php"

  local_wiktionary:
