# Unified Search — 三层引擎注册表
# =============================================================================
# 合并 T1（直连 API）、T2（local-search 本地引擎）
# 智能降级链：T1 API → T2 local-search → 缓存 → 报错
# 无外部依赖：SearXNG 已完全移除
# =============================================================================
# 状态说明:
#   ok         — 可用，正常响应
#   slow       — 可用但延迟较高
#   degraded   — 部分可用/偶发失败
#   unavailable — 不可用（CAPTCHA/地区限制/API 禁用）
#   disabled   — 已主动禁用
# =============================================================================
# 成本说明:
#   free       — 零成本
#   token      — 消耗 token（但不消耗额外 API 配额）
#   api        — 消耗 API 配额（有速率限制或付费）
# =============================================================================

