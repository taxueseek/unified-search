recommendations:
  general:
    primary: [anysearch, tavily]
    t2_fallback: [local/bing, local/duckduckgo, local/wikipedia]
    desc: "通用搜索优先 T1 API，T2 本地引擎作为后备"

  chinese:
    primary: [zhihu, eastmoney, byted]
    t2_fallback: [local/sogou, local/bing]
    note: "local/sogou 替代 local/baidu（Baidu CAPTCHA 拦截 10.68s）"
    desc: "中文搜索推荐 Sogou 而非 Baidu"

  semantic:
    primary: [exa]
    t2_fallback: [local/bing, local/duckduckgo]
    note: "开放式发现、行业调研、工具推荐 — 用尽免费额度后降级到 anysearch"
    desc: "语义发现：Exa embedding 搜索 + 内容摘要，1000次/月免费"

  wechat:
    primary: [wechat_sogou]
    t2_fallback: [local/sogou]
    note: "微信公众号文章搜索，搜狗微信搜索源"
    desc: "微信公众号：搜狗微信搜索，覆盖已发布文章"

  academic:
    primary: [arxiv, semantic_scholar]
    t2_fallback: [local/arxiv, local/pubmed, local/crossref]
    desc: "学术搜索三层全覆盖"

  code:
    primary: [github, anysearch]
    t2_fallback: [local/stackoverflow, local/github, local/gitlab]
    desc: "代码搜索三层全覆盖"

  news:
    primary: [byted]
    t2_fallback: [local/bing_news, local/google_news]
    desc: "新闻搜索双层覆盖"

  finance:
    primary: [eastmoney, byted]
    t2_fallback: [local/bing]
    desc: "金融数据以东方财富为主"
