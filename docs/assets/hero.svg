<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 200" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="800" y2="200" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#818cf8"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#38bdf8"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="200" rx="12" fill="url(#bg)"/>

  <!-- Grid pattern -->
  <g opacity="0.06" stroke="#38bdf8" stroke-width="0.5">
    <line x1="0" y1="40" x2="800" y2="40"/>
    <line x1="0" y1="80" x2="800" y2="80"/>
    <line x1="0" y1="120" x2="800" y2="120"/>
    <line x1="0" y1="160" x2="800" y2="160"/>
    <line x1="100" y1="0" x2="100" y2="200"/>
    <line x1="200" y1="0" x2="200" y2="200"/>
    <line x1="300" y1="0" x2="300" y2="200"/>
    <line x1="400" y1="0" x2="400" y2="200"/>
    <line x1="500" y1="0" x2="500" y2="200"/>
    <line x1="600" y1="0" x2="600" y2="200"/>
    <line x1="700" y1="0" x2="700" y2="200"/>
  </g>

  <!-- Central search icon -->
  <g transform="translate(400, 85)" filter="url(#glow)">
    <circle cx="0" cy="0" r="28" fill="none" stroke="url(#accent)" stroke-width="2.5" opacity="0.9"/>
    <circle cx="0" cy="0" r="18" fill="none" stroke="url(#accent)" stroke-width="1.5" opacity="0.5"/>
    <line x1="20" y1="20" x2="38" y2="38" stroke="url(#accent)" stroke-width="3" stroke-linecap="round"/>
    <circle cx="0" cy="0" r="4" fill="url(#accent)" opacity="0.8"/>
  </g>

  <!-- Engine nodes -->
  <g opacity="0.85">
    <!-- T1 nodes -->
    <circle cx="120" cy="70" r="16" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
    <text x="120" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#38bdf8">API</text>

    <circle cx="200" cy="55" r="16" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <text x="200" y="59" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8">T1</text>

    <circle cx="600" cy="55" r="16" fill="none" stroke="#818cf8" stroke-width="1.5" opacity="0.7"/>
    <text x="600" y="59" text-anchor="middle" font-family="monospace" font-size="8" fill="#818cf8">T1</text>

    <circle cx="680" cy="70" r="16" fill="none" stroke="#38bdf8" stroke-width="1.5" opacity="0.7"/>
    <text x="680" y="74" text-anchor="middle" font-family="monospace" font-size="8" fill="#38bdf8">API</text>

    <!-- T2 nodes -->
    <circle cx="120" cy="130" r="14" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <text x="120" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#34d399">T2</text>

    <circle cx="200" cy="145" r="14" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <text x="200" y="149" text-anchor="middle" font-family="monospace" font-size="7" fill="#34d399">T2</text>

    <circle cx="600" cy="145" r="14" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <text x="600" y="149" text-anchor="middle" font-family="monospace" font-size="7" fill="#34d399">T2</text>

    <circle cx="680" cy="130" r="14" fill="none" stroke="#34d399" stroke-width="1.5" opacity="0.6"/>
    <text x="680" y="134" text-anchor="middle" font-family="monospace" font-size="7" fill="#34d399">T2</text>
  </g>

  <!-- Connection lines -->
  <g stroke="url(#accent)" stroke-width="1" opacity="0.3">
    <line x1="136" y1="70" x2="370" y2="85"/>
    <line x1="216" y1="55" x2="375" y2="80"/>
    <line x1="584" y1="55" x2="425" y2="80"/>
    <line x1="664" y1="70" x2="430" y2="85"/>
    <line x1="134" y1="130" x2="370" y2="95"/>
    <line x1="214" y1="145" x2="375" y2="100"/>
    <line x1="586" y1="145" x2="425" y2="100"/>
    <line x1="666" y1="130" x2="430" y2="95"/>
  </g>

  <!-- Title -->
  <text x="400" y="170" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="white">
    Argo 阿尔戈
  </text>
  <text x="400" y="192" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="12" fill="#94a3b8">
    统一搜索 · 证据核验 · 多引擎路由 · 双层缓存
  </text>
</svg>
