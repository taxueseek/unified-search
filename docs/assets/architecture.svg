<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" fill="none">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="800" y2="500" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="g-blue" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#38bdf8"/>
      <stop offset="100%" stop-color="#0ea5e9"/>
    </linearGradient>
    <linearGradient id="g-purple" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="100%" stop-color="#6366f1"/>
    </linearGradient>
    <linearGradient id="g-green" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="100%" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="g-amber" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fbbf24"/>
      <stop offset="100%" stop-color="#f59e0b"/>
    </linearGradient>
    <linearGradient id="g-rose" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fb7185"/>
      <stop offset="100%" stop-color="#e11d48"/>
    </linearGradient>
  </defs>

  <rect width="800" height="500" rx="12" fill="url(#bg2)"/>

  <!-- Title -->
  <text x="400" y="35" text-anchor="middle" font-family="system-ui, sans-serif" font-size="16" font-weight="600" fill="#e2e8f0">Architecture</text>

  <!-- Input -->
  <rect x="320" y="50" width="160" height="36" rx="8" fill="url(#g-blue)" opacity="0.9"/>
  <text x="400" y="73" text-anchor="middle" font-family="monospace" font-size="12" fill="white" font-weight="600">Search Query</text>

  <!-- Arrow down -->
  <line x1="400" y1="86" x2="400" y2="110" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <defs><marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><polygon points="0 0, 8 3, 0 6" fill="#475569"/></marker></defs>

  <!-- Router box -->
  <rect x="250" y="110" width="300" height="55" rx="10" fill="url(#g-purple)" opacity="0.15" stroke="url(#g-purple)" stroke-width="1.5"/>
  <text x="400" y="132" text-anchor="middle" font-family="monospace" font-size="11" fill="#c4b5fd" font-weight="600">TF-IDF Semantic Router</text>
  <text x="400" y="152" text-anchor="middle" font-family="monospace" font-size="9" fill="#94a3b8">regex + cosine similarity + quota-aware scoring</text>

  <!-- Arrows from router -->
  <line x1="330" y1="165" x2="200" y2="210" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="165" x2="400" y2="210" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="470" y1="165" x2="600" y2="210" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- T1 box -->
  <rect x="80" y="210" width="240" height="80" rx="10" fill="url(#g-purple)" opacity="0.1" stroke="url(#g-purple)" stroke-width="1"/>
  <text x="200" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#a5b4fc" font-weight="600">T1 — API Engines (12)</text>
  <text x="200" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">anysearch · zhihu · eastmoney</text>
  <text x="200" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">tavily · github · arxiv · byted</text>
  <text x="200" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">0.4–3.5s · 部分需 API Key</text>

  <!-- Cache box -->
  <rect x="340" y="210" width="120" height="80" rx="10" fill="url(#g-amber)" opacity="0.1" stroke="url(#g-amber)" stroke-width="1"/>
  <text x="400" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#fcd34d" font-weight="600">Cache</text>
  <text x="400" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">L1: LRU Memory</text>
  <text x="400" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">L2: SQLite</text>
  <text x="400" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">分级 TTL</text>

  <!-- T2 box -->
  <rect x="480" y="210" width="240" height="80" rx="10" fill="url(#g-green)" opacity="0.1" stroke="url(#g-green)" stroke-width="1"/>
  <text x="600" y="232" text-anchor="middle" font-family="monospace" font-size="11" fill="#6ee7b7" font-weight="600">T2 — Local Engines (28)</text>
  <text x="600" y="250" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">bing · sogou · duckduckgo</text>
  <text x="600" y="264" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">github · stackoverflow · pubmed</text>
  <text x="600" y="280" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">0.6–5s · 零成本</text>

  <!-- Fallback arrows -->
  <path d="M 320 250 Q 330 250 330 250" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>
  <path d="M 460 250 Q 470 250 470 250" stroke="#475569" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arrowhead)"/>

  <!-- Labels for fallback -->
  <text x="325" y="244" font-family="monospace" font-size="7" fill="#64748b" text-anchor="end">T1 fail</text>
  <text x="475" y="244" font-family="monospace" font-size="7" fill="#64748b">T2 fail</text>

  <!-- Arrows to merge -->
  <line x1="200" y1="290" x2="350" y2="330" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="400" y1="290" x2="400" y2="330" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>
  <line x1="600" y1="290" x2="450" y2="330" stroke="#475569" stroke-width="1" marker-end="url(#arrowhead)"/>

  <!-- Merge / RRF box -->
  <rect x="280" y="330" width="240" height="45" rx="10" fill="url(#g-rose)" opacity="0.15" stroke="url(#g-rose)" stroke-width="1"/>
  <text x="400" y="350" text-anchor="middle" font-family="monospace" font-size="11" fill="#fda4af" font-weight="600">RRF Merge + Dedup + Rerank</text>
  <text x="400" y="368" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">Reciprocal Rank Fusion → Bocha Reranker</text>

  <!-- Arrow to output -->
  <line x1="400" y1="375" x2="400" y2="405" stroke="#475569" stroke-width="1.5" marker-end="url(#arrowhead)"/>

  <!-- Output box -->
  <rect x="280" y="405" width="240" height="50" rx="10" fill="url(#g-blue)" opacity="0.15" stroke="url(#g-blue)" stroke-width="1.5"/>
  <text x="400" y="427" text-anchor="middle" font-family="monospace" font-size="11" fill="#7dd3fc" font-weight="600">Unified JSON Output</text>
  <text x="400" y="445" text-anchor="middle" font-family="monospace" font-size="8" fill="#94a3b8">results + fallback_chain + scores + domain</text>

  <!-- Side labels -->
  <text x="45" y="260" font-family="monospace" font-size="9" fill="#6366f1" transform="rotate(-90, 45, 260)">TIER 1</text>
  <text x="755" y="260" font-family="monospace" font-size="9" fill="#10b981" transform="rotate(90, 755, 260)">TIER 2</text>
  <text x="315" y="255" font-family="monospace" font-size="7" fill="#f59e0b">→</text>
  <text x="455" y="255" font-family="monospace" font-size="7" fill="#f59e0b">→</text>
</svg>
